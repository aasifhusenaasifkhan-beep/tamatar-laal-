name: Manga Translation Worker

on:
  workflow_dispatch:
    inputs:
      file_id: { required: true }
      chat_id: { required: true }
      msg_id: { required: true }
      user_id: { required: true }
      lang: { required: true }
      style: { required: true }
      fname: { required: true }

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache Translator Workspace
        id: workspace-cache
        uses: actions/cache@v4
        with:
          path: |
            venv
            manga-image-translator
            ~/.cache/huggingface
          key: ${{ runner.os }}-manga-workspace-v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0 build-essential libeigen3-dev zip

      - name: Setup Translator
        run: |
          python -m venv venv
          source venv/bin/activate
          
          # Only run full installation if workspace cache missed
          if [ "${{ steps.workspace-cache.outputs.cache-hit }}" != "true" ]; then
            echo "Cache missed! Installing dependencies from scratch..."
            if [ ! -d "manga-image-translator" ]; then
              git clone https://github.com/zyddnys/manga-image-translator.git
              cd manga-image-translator
              git checkout $(git rev-list -n 1 --before="2024-03-01" HEAD)
              cd ..
            fi
            
            # Clean requirements.txt to prevent bad pydensecrf overwrite
            sed -i '/pydensecrf/d' manga-image-translator/requirements.txt || true
            
            pip install --no-cache-dir --upgrade pip
            pip install --no-cache-dir Cython numpy setuptools wheel
            pip install --no-cache-dir torch torchvision --index-url https://download.pytorch.org/whl/cpu
            pip install --no-cache-dir git+https://github.com/kodalli/pydensecrf.git
            pip install -r manga-image-translator/requirements.txt
            pip install pyrogram tgcrypto Pillow anyascii pymupdf requests psutil
          else
            echo "Cache hit! Virtual environment and models restored instantly."
          fi

      - name: Run Worker
        env:
          FILE_ID: ${{ github.event.inputs.file_id }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          MSG_ID: ${{ github.event.inputs.msg_id }}
          USER_ID: ${{ github.event.inputs.user_id }}
          LANG: ${{ github.event.inputs.lang }}
          STYLE: ${{ github.event.inputs.style }}
          FNAME: ${{ github.event.inputs.fname }}
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          REPO_NAME: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source venv/bin/activate
          python worker.py
